version: "3.8"

services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/mail/}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/mail/api}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    networks:
      - avenu-internal

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      PORT: 8000
      MONGO_URI: ${MONGO_URI}
      DB_NAME: ${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost}
      SCHEDULER_INTERNAL_TOKEN: ${SCHEDULER_INTERNAL_TOKEN}
      MS_GRAPH_TENANT_ID: ${MS_GRAPH_TENANT_ID}
      MS_GRAPH_CLIENT_ID: ${MS_GRAPH_CLIENT_ID}
      MS_GRAPH_CLIENT_SECRET: ${MS_GRAPH_CLIENT_SECRET}
      MS_GRAPH_SENDER_EMAIL: ${MS_GRAPH_SENDER_EMAIL}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    expose:
      - "8000"
    networks:
      - avenu-internal

  scheduler:
    build:
      context: ./scheduler
    environment:
      BACKEND_API_URL: http://backend:8000
      SCHEDULER_INTERNAL_TOKEN: ${SCHEDULER_INTERNAL_TOKEN}
      SCHEDULER_CRON: ${SCHEDULER_CRON:-0 8 * * 1}
      SCHEDULER_TIMEZONE: ${SCHEDULER_TIMEZONE:-UTC}
      SCHEDULER_TICK_SECONDS: ${SCHEDULER_TICK_SECONDS:-20}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - avenu-internal

networks:
  avenu-internal:
