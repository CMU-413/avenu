services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - avenu-internal

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      PORT: 8000
      MONGO_URI: ${MONGO_URI}
      DB_NAME: ${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      MS_GRAPH_TENANT_ID: ${MS_GRAPH_TENANT_ID}
      MS_GRAPH_CLIENT_ID: ${MS_GRAPH_CLIENT_ID}
      MS_GRAPH_CLIENT_SECRET: ${MS_GRAPH_CLIENT_SECRET}
      MS_GRAPH_SENDER_EMAIL: ${MS_GRAPH_SENDER_EMAIL}
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - avenu-internal

  scheduler:
    build:
      context: ./scheduler
    environment:
      BACKEND_API_URL: http://backend:8000
      SCHEDULER_POLL_SECONDS: ${SCHEDULER_POLL_SECONDS:-60}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - avenu-internal

  database:
    image: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - avenu-internal

volumes:
  mongo-data:

networks:
  avenu-internal:
