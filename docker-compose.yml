version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://backend:5001
        VITE_ADMIN_API_KEY: ${VITE_ADMIN_API_KEY:-}
    ports:
      - "8080:80"
    depends_on:
      - backend
