name: CI-CD

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      scheduler: ${{ steps.filter.outputs.scheduler }}
      any_changed: ${{ steps.matrices.outputs.any_changed }}
      build_matrix: ${{ steps.matrices.outputs.build_matrix }}
      deploy_matrix: ${{ steps.matrices.outputs.deploy_matrix }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            scheduler:
              - 'scheduler/**'

      - name: Build changed-service matrices
        id: matrices
        env:
          BACKEND_CHANGED: ${{ steps.filter.outputs.backend }}
          FRONTEND_CHANGED: ${{ steps.filter.outputs.frontend }}
          SCHEDULER_CHANGED: ${{ steps.filter.outputs.scheduler }}
        run: |
          python - <<'PY'
          import json
          import os

          include = []
          if os.environ.get("BACKEND_CHANGED") == "true":
              include.append({"service": "backend"})
          if os.environ.get("FRONTEND_CHANGED") == "true":
              include.append({"service": "frontend"})
          if os.environ.get("SCHEDULER_CHANGED") == "true":
              include.append({"service": "scheduler"})

          matrix = json.dumps({"include": include})
          any_changed = "true" if include else "false"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"build_matrix={matrix}\n")
              fh.write(f"deploy_matrix={matrix}\n")
              fh.write(f"any_changed={any_changed}\n")
          PY

  build:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.any_changed == 'true'

    strategy:
      matrix: ${{ fromJSON(needs.detect-changes.outputs.build_matrix) }}

    steps:
      - uses: actions/checkout@v4

      # --------------------
      # Backend & Scheduler (Python)
      # --------------------
      - name: Set up Python
        if: matrix.service == 'backend' || matrix.service == 'scheduler'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: matrix.service == 'backend' || matrix.service == 'scheduler'
        working-directory: ./${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ "${{ matrix.service }}" = "backend" ]; then
            pip install coverage
          fi

      - name: Run Python tests (scheduler)
        if: matrix.service == 'scheduler'
        working-directory: ./scheduler
        run: python -m unittest discover tests

      - name: Run Python tests with coverage (backend)
        if: matrix.service == 'backend'
        working-directory: ./backend
        run: |
          coverage run --rcfile=.coveragerc -m unittest discover -s tests/unit -p "test_*.py" -t .
          coverage report --rcfile=.coveragerc --fail-under=75

      # --------------------
      # Frontend (Node / Vite)
      # --------------------
      - name: Set up Node
        if: matrix.service == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        if: matrix.service == 'frontend'
        working-directory: ./frontend
        run: npm install

      - name: Lint frontend
        if: matrix.service == 'frontend'
        working-directory: ./frontend
        run: npm run lint

      - name: Type-check frontend
        if: matrix.service == 'frontend'
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Build frontend
        if: matrix.service == 'frontend'
        working-directory: ./frontend
        run: npm run build

  backend-integration:
    name: integration tests (backend)
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.any_changed == 'true'
    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Mongo integration tests
        working-directory: ./backend
        env:
          RUN_MONGO_INTEGRATION: "1"
          MONGO_URI: "mongodb://localhost:27017/avenu_db_dev"
          DB_NAME: "avenu_db_dev"
          FLASK_TESTING: "true"
          SCHEDULER_INTERNAL_TOKEN: "scheduler-secret"
        run: python -m unittest discover -s tests/integration -t .

  deploy:
    name: build & push GHCR images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.any_changed == 'true'
    needs: [build, backend-integration, detect-changes]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_REGISTRY: ghcr.io
      IMAGE_OWNER: cmu-413

    strategy:
      matrix: ${{ fromJSON(needs.detect-changes.outputs.deploy_matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_OWNER }}/avenu-${{ matrix.service }}:latest
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_OWNER }}/avenu-${{ matrix.service }}:sha-${{ github.sha }}
