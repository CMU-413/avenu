name: CI-CD

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      scheduler: ${{ steps.filter.outputs.scheduler }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            scheduler:
              - 'scheduler/**'

  build:
    runs-on: ubuntu-latest
    needs: detect-changes

    strategy:
      matrix:
        service: [backend, frontend, scheduler]

    steps:
      - uses: actions/checkout@v4

      - name: Determine if service changed
        id: changed
        run: |
          if [ "${{ needs.detect-changes.outputs.backend }}" = "true" ] && [ "${{ matrix.service }}" = "backend" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          elif [ "${{ needs.detect-changes.outputs.frontend }}" = "true" ] && [ "${{ matrix.service }}" = "frontend" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          elif [ "${{ needs.detect-changes.outputs.scheduler }}" = "true" ] && [ "${{ matrix.service }}" = "scheduler" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if unchanged
        if: steps.changed.outputs.run != 'true'
        run: echo "Skipping ${{ matrix.service }}"

      # --------------------
      # Backend & Scheduler (Python)
      # --------------------
      - name: Set up Python
        if: steps.changed.outputs.run == 'true' && (matrix.service == 'backend' || matrix.service == 'scheduler')
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: steps.changed.outputs.run == 'true' && (matrix.service == 'backend' || matrix.service == 'scheduler')
        working-directory: ./${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ "${{ matrix.service }}" = "backend" ]; then
            pip install coverage
          fi

      - name: Run Python tests (scheduler)
        if: steps.changed.outputs.run == 'true' && matrix.service == 'scheduler'
        working-directory: ./scheduler
        run: python -m unittest discover tests

      - name: Run Python tests with coverage (backend)
        if: steps.changed.outputs.run == 'true' && matrix.service == 'backend'
        working-directory: ./backend
        run: |
          coverage run -m unittest discover tests
          coverage report --fail-under=75

      # --------------------
      # Frontend (Node / Vite)
      # --------------------
      - name: Set up Node
        if: steps.changed.outputs.run == 'true' && matrix.service == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        if: steps.changed.outputs.run == 'true' && matrix.service == 'frontend'
        working-directory: ./frontend
        run: npm install

      - name: Lint frontend
        if: steps.changed.outputs.run == 'true' && matrix.service == 'frontend'
        working-directory: ./frontend
        run: npm run lint

      - name: Type-check frontend
        if: steps.changed.outputs.run == 'true' && matrix.service == 'frontend'
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Build frontend
        if: steps.changed.outputs.run == 'true' && matrix.service == 'frontend'
        working-directory: ./frontend
        run: npm run build

  deploy:
    name: Docker Build & Push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build, detect-changes]
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [backend, frontend, scheduler]

    steps:
      - uses: actions/checkout@v4

      - name: Determine if service changed
        id: changed
        run: |
          if [ "${{ needs.detect-changes.outputs.backend }}" = "true" ] && [ "${{ matrix.service }}" = "backend" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          elif [ "${{ needs.detect-changes.outputs.frontend }}" = "true" ] && [ "${{ matrix.service }}" = "frontend" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          elif [ "${{ needs.detect-changes.outputs.scheduler }}" = "true" ] && [ "${{ matrix.service }}" = "scheduler" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if unchanged
        if: steps.changed.outputs.run != 'true'
        run: echo "Skipping ${{ matrix.service }}"

      - name: Set up Docker Buildx
        if: steps.changed.outputs.run == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.changed.outputs.run == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build & Push
        if: steps.changed.outputs.run == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          platforms: linux/amd64
          push: true
          tags: |
            chunkitw/avenu-${{ matrix.service }}:latest
            chunkitw/avenu-${{ matrix.service }}:sha-${{ github.sha }}
