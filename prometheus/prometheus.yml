# Scrape config when Prometheus runs in the same Docker Compose stack and network
# as the `backend` service (see docker-compose service name). Internal port is 8000.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: avenu-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
